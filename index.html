<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" type="image/webp" href="./image/MK7_logo.webp" />
  <title>МК7 — Distant</title>
</head>

<body>

  <header class="header">
    <nav class="navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img class="logo" src="./image/MK7_logo.webp" alt="MK7">
          MK7 · Distant
        </a>

        <ul class="navbar-nav">
          <li class="nav-item">
            <button class="nav-link active" type="button" data-navBtn="main">Группы</button>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://clck.ru/3PWCPH" target="_blank" data-navBtn="myID">Мой ID</a>
          </li>
          <li class="nav-item">
            <button class="nav-link" type="button" data-navBtn="navList">Ссылки</button>
          </li>
        </ul>

        <form class="search" role="search">
          <input class="searchInput" type="number" placeholder="Поиск по номеру группы" aria-label="Поиск">
          <button class="theme-toggle" type="button" aria-label="Переключить тему"></button>
        </form>
      </div>
    </nav>
  </header>

  <main class="main">
    <section class="card-list"></section>

    <section class="linkCollection visible">
      <h2 class="linkCollection__title">Список ссылок</h2>
      <ol class="linksRow"></ol>
    </section>
  </main>

</body>

<template id="cardTemplate">
  <article class="card" data-groupid>
    <img class="card-img-top" src="" alt="" loading="lazy">
    <div class="card-body">
      <h5 class="card-title"></h5>
      <p class="card-text">Группа для дистанционного обучения в MAX</p>
      <a href="#" class="link__groupMAX" target="_blank">Присоединиться</a>
    </div>
  </article>
</template>

<template id="linkRow">
  <li class="linkRow"></li>
</template>

<script src="./js/data.js"></script>
<script src="./js/theme.js"></script>
<script src="./js/search.js"></script>
<script src="./js/main.js"></script>

</html>
